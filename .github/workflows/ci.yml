# PD-2 — Lados CI: build → typecheck → test on every push/PR to main.
# Secret scanning runs as a separate job (see secret-scan below).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version is read from the "packageManager" field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages and packs
        run: pnpm build:packages && pnpm build:packs

      - name: Build apps
        run: pnpm --filter api build && pnpm --filter web build
        env:
          # Next.js needs these at build time; dummy values are fine for CI builds
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-key

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm --filter api test

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan full history on PRs

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
